# Allow PipeWire to switch the clock between 44.1 kHz and 48 kHz (instead of
# resampling everything to a single rate). Drop-in override, merged on top of the
# packaged /usr/share/pipewire/pipewire.conf -- so it survives PipeWire updates,
# unlike copying the whole file.
context.properties = {
    default.clock.allowed-rates = [ 44100 48000 ]
}
